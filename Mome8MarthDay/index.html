<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>С 8 марта, Мамочка!!!</title>
    <link rel="stylesheet" href="./style/normalize.css">
    <link rel="stylesheet" href="./style/style.css">
</head>
<body>
    <!-- Летающие лепестки (генерируем через JS) -->
    <div class="floating-petals" id="petalsContainer"></div>

    <div class="card">
        <div class="flower-corner"></div>
        
        <h1>&#127799; С 8 марта, Мамочка! &#127799;</h1>
        <div class="subtitle">Самому родному человеку</div>

        <div class="image-container bouquet-svg">
           <img src="./image/1.jpg" alt="Маме" srcset="">
        </div>

        <!-- Теплые слова -->
        <div class="message">
            <p>
                <i>&#128150;</i><br>
                Мама, спасибо за тепло и ласку,<br>
                За нежность, заботу и добрую сказку.<br>
                Пусть весна в твоей душе цветёт,<br>
                И счастье каждый день несёт!<br>
                <i>&#127802;</i>
            </p>
        </div>

        <div class="signature">
            Твой любящий Пашка
        </div>

        <!-- Интерактивная кнопка -->
        <button class="surprise-btn" id="surpriseBtn">&#10024; Сюрприз для мамы &#10024;</button>
    </div>

    <script src="./js/app.js"></script>
</body>
</html>
