<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=yes">
  <title>С днём рождения, Ваня!!!</title>
  <link rel="stylesheet" href="./style/style.css">n
</head>
<body>
  <div class="bg-particles" id="particles-container"></div>

  <main class="birthday-card">
    <div class="cake-icon">&#127874;</div>
    <h1 class="name-title">Ваня</h1>
    <div class="sub-greeting">С днём рождения!!!</div>

    <div class="message-box">
      <strong>Дорогой друг!</strong>
      <p>Сегодня твой особенный день. Пусть каждый момент будет наполнен радостью, смехом и теплом близких.</p>
      <p class="wish-text">Ярких приключений, крепкого здоровья и исполнения самых смелых желаний. Ты — легенда, Вань:)</p>
    </div>

    <button class="celebrate-btn" id="celebrateButton">
      Поздравить с фейерверком
    </button>

    <div class="signature">
      <span>От</span> <span style="font-weight:500; color:#f7c894;">твоего друга</span> <span>Пашки!!!</span>
    </div>
  </main>

  <canvas id="confetti-canvas"></canvas>

  <script src="./js/app.js"></script>
</body>
</html>
