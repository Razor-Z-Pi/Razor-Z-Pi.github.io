<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>С 8 марта, Сестренка!!!</title>
    <link rel="stylesheet" href="./style/normalize.css">
    <link rel="stylesheet" href="./style/style.css">
</head>
<body>
    <!-- Блестки -->
    <div class="glitter" id="glitterContainer"></div>

    <div class="card">
        <div class="header">
            &#127800; С 8 марта, Сестрёнка! &#127800;
        </div>
        <div class="emoji-row">
            <span>&#128132;</span> <span>&#128096;</span> <span>&#128092;</span> <span>&#128133;</span>
        </div>

        <!-- Милая иллюстрация -->
        <div class="sister-illustration">
            <img width="200px" height="200px" style="border-radius: 50%;" src="./image/1.jpg" alt="Сестрёнка" srcset="">
        </div>

        <!-- Комплименты -->
        <div class="compliments">
            <span class="compliment-item">&#10024; Стильная &#10024;</span>
            <span class="compliment-item">&#128171; Яркая &#128171;</span>
            <span class="compliment-item">&#127800; Нежная &#127800;</span>
            <span class="compliment-item">&#127775; Умная &#127775;</span>
            <span class="compliment-item">&#128150; Самая лучшая &#128150;</span>
        </div>

        <!-- Основные пожелания -->
        <div class="message-block">
            <p>
                &#129346; Сестренка, с праздником весны!<br>
                Пусть исполняются мечты,<br>
                Ты будь <span class="highlight">счастливой</span> и <span class="highlight">красивой</span>,<br>
                Неотразимой и любимой!<br>
                Сияй ярче всех бриллиантов &#10024;
            </p>
        </div>

        <!-- Кнопка, которая "колдует" -->
        <button class="magic-button" id="magicSister">
            <span>&#128302;</span> Волшебство для сестры <span>&#128302;</span>
        </button>

        <div class="signature-sis">
            Твой брат Пашка &#128150;
        </div>
    </div>

    <script src="./js/app.js"></script>
</body>
</html>
