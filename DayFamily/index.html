<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>С Днём семьи!!!</title>
  <link rel="stylesheet" href="./style/style.css">
</head>
<body>
  <div class="card">
    <div class="icon-row">
      <span class="icon-emoji">&#127969;</span>
    </div>

    <h1>С Днём семьи!!!</h1>
    <div class="subhead">8 июля - родные сердца</div>

    <div class="message-box">
      <span class="message-text">Дорогие мои,</span>
      <span class="message-text">сегодня самый <span class="highlight">тёплый</span> праздник —<br>День семьи, любви и верности.</span>
      <span style="display:block; margin-top:0.7rem;">Пусть в нашем доме всегда живут<br>счастье, забота и уют. &#128171;</span>
    </div>

    <div class="family-gallery" id="familyBadgesContainer">
      <div class="family-badge"><span>&#129489;</span> Папа</div>
      <div class="family-badge"><span>&#128105;</span> Мама</div>
      <div class="family-badge"><span>&#129490;</span> Cестрёнка</div>
      <div class="family-badge"><span>&#128102;</span> Братюня</div>
    </div>

    <div class="image-pozdr">
        <img src="./image/image.jpg" alt="С Днём Семьи">
    </div>

    <button class="btn-heart" id="heartButton">
      <span>&#128150;</span> Поздравить от души <span>&#128150;</span>
    </button>

    <div id="surpriseMessage">
        &#10024; Вы — моя самая большая драгоценность! &#10024;
    </div>

    <div class="footer-note">
      <span>&#127803;</span> С любовью, от Пашки <span>&#127803;</span>
    </div>
  </div>

  <script src="./js/app.js"></script>
</body>
</html>
