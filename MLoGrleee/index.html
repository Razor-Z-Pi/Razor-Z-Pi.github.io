<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Для моей любимой!!!</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Милые пузыри на фоне -->
  <div class="floating-bg">
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
  </div>

  <div class="card">
    <h1>&#10024; Солнышко &#10024;</h1>
    
    <div class="cute-illustration">
      &#128059;&#129528;&#128048;
    </div>

    <div class="message">
      Ты — самое тёплое, что случилось со мной. <br> 
      С тобой каждый день как из мультика: яркий, смешной и полный волшебства! &#127800;
    </div>

    <div class="heart-row">
      <span>&#128151;</span><span>&#127801;</span><span>&#128151;</span><span>&#127856;</span><span>&#128151;</span>
    </div>

    <!-- Кнопка, открывающая секретное сообщение -->
    <button id="magicButton">
      <span>&#127872;</span> Нажми меня <span>&#127872;</span>
    </button>

    <!-- Скрытое послание, появляется по клику -->
    <div id="secretMessage" class="hidden-message">
      &#127775; Ты моя самая любимая сладость! <br>
      Спасибо, что делаешь мир таким уютным. <br>
      Обожаю тебя до луны и обратно! &#128640;&#127770;&#128150;
    </div>

    <div class="signature">
      <span>&#128035;</span> Твой мишка Пашутка<span>&#128035;</span>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
