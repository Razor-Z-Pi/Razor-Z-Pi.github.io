<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=yes">
  <title>С днём рождения, лучший друг!!!</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="card">
    <h1>С днём рождения!</h1>
    <div class="subhead">самому верному другу</div>
    
    <div class="friend-name" id="friendNameDisplay">Артёмка</div>
    
    <div class="message">
      Ты не просто друг — ты часть моей истории. <br>
      Спасибо за каждый момент, за смех до слёз и поддержку. <br>
      Пусть этот день принесёт тебе столько же радости, сколько ты даришь другим.
    </div>
    
    <div class="button-group">
      <button class="btn" id="wishBtn">Тёплые пожелания</button>
      <button class="btn" id="confettiBtn">Праздничный салют</button>
    </div>
    
    <div class="surprise-block" id="surpriseMessage">
      Ты — настоящий подарок судьбы. Пусть сбудутся самые смелые мечты!!!
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
